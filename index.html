<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME | わたくしのインターネット備忘録</title>
    <meta name="google-site-verification" content="あなたの認証コード" />

    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/common.js" defer></script>
    <script src="assets/js/visitor.js" defer></script>
</head>
<body>

    <div id="common-header"></div>

    <div class="container">
        <main>
            <section class="hero">
                <h2>Welcome to My Garden</h2>
                <p>自作キーボード、プログラミング、そしてインターネットの深淵へようこそ。</p>
            </section>

            <h2 style="margin:2rem 0 1rem;font-size:1.2rem;color:#1e293b;">最新記事</h2>
            <div class="post-list" id="recent-posts">
                <p style="color:#94a3b8;font-size:0.9rem;">読み込み中...</p>
            </div>
        </main>

        <aside id="common-sidebar"></aside>
    </div>

    <div id="common-footer"></div>

    <script>
        window.addEventListener('DOMContentLoaded', async function () {
            try {
                const res   = await fetch('/blog/posts.json');
                const posts = await res.json();
                posts.sort(function(a, b){ return new Date(b.date) - new Date(a.date); });
                const latest = posts.slice(0, 5);
                document.getElementById('recent-posts').innerHTML = latest.map(function(post) {
                    return '<article class="post-card">'
                        + '<div class="post-meta">' + post.date.replace(/-/g, '.') + '</div>'
                        + '<div class="category" style="margin:0.4rem 0;">' + (post.category || '未分類') + '</div>'
                        + '<h3 style="margin:0.4rem 0;"><a href="/blog/post.html?id=' + post.id + '" style="color:inherit;text-decoration:none;">' + post.title + '</a></h3>'
                        + '<p style="font-size:0.9rem;color:#64748b;margin:0.4rem 0 0.8rem;">' + (post.description || '') + '</p>'
                        + '<a href="/blog/post.html?id=' + post.id + '" class="read-more">もっと読む →</a>'
                        + '</article>';
                }).join('');
            } catch(e) {
                document.getElementById('recent-posts').innerHTML =
                    '<p style="color:#94a3b8;">記事の読み込みに失敗しました</p>';
            }
        });
    </script>

</body>
</html>

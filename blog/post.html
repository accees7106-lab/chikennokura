<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>BLOG | サイト名</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="/assets/js/common.js" defer></script>
    <!-- 軽量マークダウン変換ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="common-header"></div>

    <main class="container" style="flex-direction: column; align-items: center;">
        <!-- ここにマークダウンがHTMLとして流し込まれます -->
        <article id="markdown-content" class="post-card" style="width: 100%; max-width: 800px;">
            <header id="post-header" class="post-header"></header>
            <div id="post-body"></div>
        </article>
    </main>

    <div id="common-footer"></div>

    <script>
                async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const postId = params.get('id');
            if (!postId) return;

            try {
                const response = await fetch(`/blog/posts/${postId}.md`);
                const text = await response.text();

                // Front Matter を解析する正規表現（天才的な呪文ですわ）
                const match = text.match(/^---\r?\n([\s\S]+?)\r?\n---/);
                let content = text;
                let metadata = {};

                if (match) {
                    // メタデータ部分を抽出
                    const yamlText = match[1];
                    yamlText.split('\n').forEach(line => {
                        const [key, ...value] = line.split(':');
                        if (key && value) metadata[key.trim()] = value.join(':').trim();
                    });
                    // 本文から Front Matter 部分を削除
                    content = text.replace(match[0], '');
                }

                // 読了時間の計算 (1分間に400文字読むと想定)
                const readTime = Math.ceil(content.length / 400);

                // メタデータを画面に表示
                renderMetadata(metadata, readTime);

                // 本文をHTMLに変換
                document.getElementById('post-body').innerHTML = marked.parse(content);

            } catch (error) {
                console.error("解析エラーですわ！", error);
            }
        }

        function renderMetadata(data, time) {
            const header = document.getElementById('post-header');
            if (!header) return;

            // ページタイトルを記事名に更新
            if (data.title) {
                document.title = `${data.title} | わたくしのインターネット備忘録`;
            }

            // タグを配列にしてリンク風にする処理
            const tagsHtml = data.tags ? data.tags.replace(/[\[\]]/g, '').split(',').map(tag => {
                const trimmedTag = tag.trim();
                return `<a href="/blog/index.html?tag=${encodeURIComponent(trimmedTag)}" class="tag">#${trimmedTag}</a>`;
            }).join(' ') : '';

            header.innerHTML = `
                <a href="/blog/index.html?category=${encodeURIComponent(data.category || '未分類')}" class="category">${data.category || '未分類'}</a>
                <h1 class="post-title">${data.title || '無題の記事'}</h1>
                <p class="description">${data.description || ''}</p>
                <div class="post-info">
                    <span>📅 投稿: ${data.date || '----'}</span>
                    ${data.update ? `<span>🔄 更新: ${data.update}</span>` : ''}
                    <span>⏱️ 読了目安: 約${time}分</span>
                </div>
                <div class="tags-container">${tagsHtml}</div>
                <hr>
            `;
        }

        window.addEventListener('DOMContentLoaded', loadPost);
    </script>
</body>
</html>

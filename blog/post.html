<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事 | わたくしのインターネット備忘録</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/post.css">
    <script src="/assets/js/common.js" defer></script>
    <script src="/assets/js/visitor.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="common-header"></div>

    <div class="container">
        <main class="post-main">

            <!-- ステータスブロック -->
            <div id="post-status" class="post-status-block">
                <div id="status-loading" class="status-loading">読み込み中...</div>
            </div>

            <!-- 本文エリア -->
            <article id="post-body" class="post-body-block"></article>

        </main>

        <aside id="common-sidebar"></aside>
    </div>

    <div id="common-footer"></div>

    <script>
        async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const postId = params.get('id');
            if (!postId) {
                document.getElementById('post-status').innerHTML = '<p>記事が見つかりませんでした。</p>';
                return;
            }

            try {
                const response = await fetch(`/blog/posts/${postId}.md`);
                if (!response.ok) throw new Error('記事の取得に失敗しましたわ');
                const text = await response.text();

                // Front Matter を解析
                const match = text.match(/^---\r?\n([\s\S]+?)\r?\n---/);
                let content = text;
                let meta = {};

                if (match) {
                    match[1].split('\n').forEach(line => {
                        const colonIdx = line.indexOf(':');
                        if (colonIdx === -1) return;
                        const key = line.slice(0, colonIdx).trim();
                        const val = line.slice(colonIdx + 1).trim();
                        if (key) meta[key] = val;
                    });
                    content = text.slice(match[0].length).trim();
                }

                const readMin = Math.max(1, Math.ceil(content.length / 400));

                renderStatus(meta, readMin);
                renderBody(content);

                if (meta.title) {
                    document.title = `${meta.title} | わたくしのインターネット備忘録`;
                }

            } catch (err) {
                console.error(err);
                document.getElementById('post-status').innerHTML = '<p>記事の読み込みに失敗しましたわ...</p>';
            }
        }

        function renderStatus(meta, readMin) {
            const tags = meta.tags
                ? meta.tags.replace(/[\[\]]/g, '').split(',')
                    .map(t => t.trim()).filter(Boolean)
                    .map(t => `<a href="/blog/index.html?tag=${encodeURIComponent(t)}" class="tag">#${t}</a>`)
                    .join('')
                : '';

            const imageHtml = meta.image
                ? `<img src="${meta.image}" alt="${meta.title || ''}" class="post-thumb">`
                : '';

            document.getElementById('post-status').innerHTML = `
                ${imageHtml}
                <div class="status-meta-row">
                    <a href="/blog/index.html?category=${encodeURIComponent(meta.category || '未分類')}" class="category">${meta.category || '未分類'}</a>
                    <span class="status-readtime">⏱ 約${readMin}分</span>
                </div>
                <h1 class="status-title">${meta.title || '無題の記事'}</h1>
                ${meta.description ? `<p class="status-description">${meta.description}</p>` : ''}
                <div class="status-dates">
                    <span>📅 投稿: ${meta.date || '----'}</span>
                    ${meta.update ? `<span>🔄 更新: ${meta.update}</span>` : ''}
                </div>
                ${tags ? `<div class="status-tags">${tags}</div>` : ''}
            `;
        }

        function renderBody(content) {
            document.getElementById('post-body').innerHTML = marked.parse(processShortcodes(content));
        }

        /* ============================================================
           ショートコード処理
           記事の Markdown 内で使える独自パーツ
        ============================================================ */
        function processShortcodes(text) {

            /* ── 折りたたみ（マルチライン・再帰対応）────────────────
               :::details[タイトル]
               内容（Markdown OK）
               :::
            ──────────────────────────────────────────────────────── */
            text = text.replace(/:::details\[([^\]]*)\]\n([\s\S]*?)\n:::/g, function(_, title, body) {
                var inner = marked.parse(processShortcodes(body.trim()));
                return '\n<details class="sc-details">'
                    + '<summary class="sc-details-summary">' + title.trim() + '</summary>'
                    + '<div class="sc-details-body">' + inner + '</div>'
                    + '</details>\n';
            });

            /* ── YouTube 埋め込み ─────────────────────────────────
               ::youtube[動画ID または URL]
            ──────────────────────────────────────────────────────── */
            text = text.replace(/::youtube\[([^\]]+)\]/g, function(_, raw) {
                var id = extractYouTubeId(raw.trim());
                if (!id) return raw;
                return '\n<div class="sc-video-wrap">'
                    + '<iframe src="https://www.youtube.com/embed/' + id + '"'
                    + ' allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"'
                    + ' allowfullscreen loading="lazy"></iframe>'
                    + '</div>\n';
            });

            /* ── 注釈ボックス 4種 ────────────────────────────────
               ::note[テキスト]
               ::warning[テキスト]
               ::info[テキスト]
               ::tip[テキスト]
            ──────────────────────────────────────────────────────── */
            [
                ['note',    '📝', 'ノート'],
                ['warning', '⚠️', '注意'],
                ['info',    'ℹ️', '情報'],
                ['tip',     '💡', 'ヒント'],
            ].forEach(function(b) {
                text = text.replace(new RegExp('::' + b[0] + '\\[([^\\]]+)\\]', 'g'), function(_, msg) {
                    return '\n<div class="sc-box sc-box--' + b[0] + '">'
                        + '<span class="sc-box-icon">' + b[1] + '</span>'
                        + '<span class="sc-box-label">' + b[2] + '</span>'
                        + '<span class="sc-box-text">' + msg.trim() + '</span>'
                        + '</div>\n';
                });
            });

            /* ── リンクボタン ─────────────────────────────────────
               ::button[ボタンテキスト | URL]
            ──────────────────────────────────────────────────────── */
            text = text.replace(/::button\[([^\|]+)\|([^\]]+)\]/g, function(_, label, url) {
                return '\n<div class="sc-button-wrap">'
                    + '<a href="' + safeUrl(url.trim()) + '" class="sc-button" target="_blank" rel="noopener noreferrer">'
                    + label.trim()
                    + '</a></div>\n';
            });

            /* ── リンクカード ─────────────────────────────────────
               ::card[タイトル | 説明文 | URL]
            ──────────────────────────────────────────────────────── */
            text = text.replace(/::card\[([^\|]+)\|([^\|]+)\|([^\]]+)\]/g, function(_, title, desc, url) {
                var u = url.trim();
                return '\n<a href="' + safeUrl(u) + '" class="sc-card" target="_blank" rel="noopener noreferrer">'
                    + '<div class="sc-card-title">' + title.trim() + '</div>'
                    + '<div class="sc-card-desc">' + desc.trim() + '</div>'
                    + '<div class="sc-card-url">' + u + '</div>'
                    + '</a>\n';
            });

            /* ── X（Twitter）リンクカード ─────────────────────────
               ::tweet[ツイートURL]
            ──────────────────────────────────────────────────────── */
            text = text.replace(/::tweet\[([^\]]+)\]/g, function(_, url) {
                var u = url.trim();
                return '\n<a href="' + safeUrl(u) + '" class="sc-tweet" target="_blank" rel="noopener noreferrer">'
                    + '<span class="sc-tweet-icon">𝕏</span>'
                    + '<span class="sc-tweet-text">ポストを見る</span>'
                    + '<span class="sc-tweet-url">' + u + '</span>'
                    + '</a>\n';
            });

            return text;
        }

        /* YouTube の動画ID を URL・短縮URL・IDのいずれからでも抽出 */
        function extractYouTubeId(raw) {
            var m;
            m = raw.match(/[?&]v=([A-Za-z0-9_-]{11})/);   if (m) return m[1];
            m = raw.match(/youtu\.be\/([A-Za-z0-9_-]{11})/); if (m) return m[1];
            m = raw.match(/embed\/([A-Za-z0-9_-]{11})/);    if (m) return m[1];
            if (/^[A-Za-z0-9_-]{11}$/.test(raw))            return raw;
            return null;
        }

        /* javascript: URL を弾く */
        function safeUrl(u) {
            return /^javascript:/i.test(u) ? '#' : u;
        }

        window.addEventListener('DOMContentLoaded', loadPost);
    </script>
</body>
</html>

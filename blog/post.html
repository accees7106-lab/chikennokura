<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事 | わたくしのインターネット備忘録</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/post.css">
    <script src="/assets/js/common.js" defer></script>
    <script src="/assets/js/visitor.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="common-header"></div>

    <div class="container">
        <main class="post-main">

            <!-- ステータスブロック -->
            <div id="post-status" class="post-status-block">
                <div id="status-loading" class="status-loading">読み込み中...</div>
            </div>

            <!-- 本文エリア -->
            <article id="post-body" class="post-body-block"></article>

        </main>

        <aside id="common-sidebar"></aside>
    </div>

    <div id="common-footer"></div>

    <script>
        async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const postId = params.get('id');
            if (!postId) {
                document.getElementById('post-status').innerHTML = '<p>記事が見つかりませんでした。</p>';
                return;
            }

            try {
                const response = await fetch(`/blog/posts/${postId}.md`);
                if (!response.ok) throw new Error('記事の取得に失敗しましたわ');
                const text = await response.text();

                // Front Matter を解析
                const match = text.match(/^---\r?\n([\s\S]+?)\r?\n---/);
                let content = text;
                let meta = {};

                if (match) {
                    match[1].split('\n').forEach(line => {
                        const colonIdx = line.indexOf(':');
                        if (colonIdx === -1) return;
                        const key = line.slice(0, colonIdx).trim();
                        const val = line.slice(colonIdx + 1).trim();
                        if (key) meta[key] = val;
                    });
                    content = text.slice(match[0].length).trim();
                }

                const readMin = Math.max(1, Math.ceil(content.length / 400));

                renderStatus(meta, readMin);
                renderBody(content);

                if (meta.title) {
                    document.title = `${meta.title} | わたくしのインターネット備忘録`;
                }

            } catch (err) {
                console.error(err);
                document.getElementById('post-status').innerHTML = '<p>記事の読み込みに失敗しましたわ...</p>';
            }
        }

        function renderStatus(meta, readMin) {
            const tags = meta.tags
                ? meta.tags.replace(/[\[\]]/g, '').split(',')
                    .map(t => t.trim()).filter(Boolean)
                    .map(t => `<a href="/blog/index.html?tag=${encodeURIComponent(t)}" class="tag">#${t}</a>`)
                    .join('')
                : '';

            const imageHtml = meta.image
                ? `<img src="${meta.image}" alt="${meta.title || ''}" class="post-thumb">`
                : '';

            document.getElementById('post-status').innerHTML = `
                ${imageHtml}
                <div class="status-meta-row">
                    <a href="/blog/index.html?category=${encodeURIComponent(meta.category || '未分類')}" class="category">${meta.category || '未分類'}</a>
                    <span class="status-readtime">⏱ 約${readMin}分</span>
                </div>
                <h1 class="status-title">${meta.title || '無題の記事'}</h1>
                ${meta.description ? `<p class="status-description">${meta.description}</p>` : ''}
                <div class="status-dates">
                    <span>📅 投稿: ${meta.date || '----'}</span>
                    ${meta.update ? `<span>🔄 更新: ${meta.update}</span>` : ''}
                </div>
                ${tags ? `<div class="status-tags">${tags}</div>` : ''}
            `;
        }

        function renderBody(content) {
            document.getElementById('post-body').innerHTML = marked.parse(content);
        }

        window.addEventListener('DOMContentLoaded', loadPost);
    </script>
</body>
</html>
